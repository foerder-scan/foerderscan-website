services:
  db:
    image: postgres:16-alpine
    container_name: foerderscan_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: foerderscan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: foerderscan_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
