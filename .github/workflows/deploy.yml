name: Deploy → Hostinger VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_build:
        description: "Skip build (nur restart)"
        required: false
        default: "false"

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── Code auschecken ────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── Node.js Setup ──────────────────────────────────
      - name: Node.js 20 einrichten
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: foerderscan/package-lock.json

      # ── Dependencies ───────────────────────────────────
      - name: Dependencies installieren
        working-directory: foerderscan
        run: npm ci

      # ── Prisma ─────────────────────────────────────────
      - name: Prisma Client generieren
        working-directory: foerderscan
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma generate

      # ── DB-Migration ───────────────────────────────────
      - name: Datenbank-Migration ausführen
        working-directory: foerderscan
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx prisma migrate deploy

      # ── Build ──────────────────────────────────────────
      - name: Next.js bauen
        if: ${{ github.event.inputs.skip_build != 'true' }}
        working-directory: foerderscan
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXTAUTH_URL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: npm run build

      # ── Deploy via SSH ─────────────────────────────────
      - name: Auf Hostinger deployen
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "── Deploy gestartet: $(date) ──"

            cd /var/www/foerderscan

            # Neuesten Code holen
            git fetch origin main
            git reset --hard origin/main

            # In App-Verzeichnis wechseln
            cd foerderscan

            # Prod-Dependencies installieren
            npm ci --omit=dev

            # Prisma Client auf Server regenerieren
            npx prisma generate

            # Next.js Build auf Server (nutzt gespeicherten Cache)
            export $(cat .env.production | grep -v '^#' | xargs)
            npm run build

            # PM2 zero-downtime reload
            pm2 reload foerderscan --update-env || pm2 start ecosystem.config.js
            pm2 save

            echo "── Deploy erfolgreich: $(date) ──"
            pm2 list
