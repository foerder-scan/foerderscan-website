# FörderScan – Nginx Konfiguration (Hostinger VPS)
# Nach certbot automatisch mit SSL ergänzt.
# Manuell: /etc/nginx/sites-available/foerderscan
#
# Aktivieren:
#   ln -sf /etc/nginx/sites-available/foerderscan /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx

# HTTP → HTTPS Redirect
server {
    listen 80;
    listen [::]:80;
    server_name foerderscan.de www.foerderscan.de;
    return 301 https://$host$request_uri;
}

# Hauptblock HTTPS
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name foerderscan.de www.foerderscan.de;

    # SSL (Let's Encrypt via certbot)
    ssl_certificate      /etc/letsencrypt/live/foerderscan.de/fullchain.pem;
    ssl_certificate_key  /etc/letsencrypt/live/foerderscan.de/privkey.pem;
    include              /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam          /etc/letsencrypt/ssl-dhparams.pem;

    # Security Headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip-Komprimierung
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Rate Limiting für API-Routen
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Next.js Static Assets — immutable caching
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Favicon + robots.txt ohne Logging
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Alle anderen Routen → Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Logs
    access_log /var/log/nginx/foerderscan_access.log;
    error_log  /var/log/nginx/foerderscan_error.log warn;
}
